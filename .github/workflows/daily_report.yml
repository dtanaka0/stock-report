name: 株式日次レポート自動送信

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要ライブラリのインストール
        run: pip install -r requirements.txt

      - name: Secrets確認（値は隠れます）
        run: |
          echo "ANTHROPIC_API_KEY 登録済み: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "GMAIL_ADDRESS 登録済み: ${{ secrets.GMAIL_ADDRESS != '' }}"
          echo "GMAIL_PASSWORD 登録済み: ${{ secrets.GMAIL_PASSWORD != '' }}"
          echo "TO_ADDRESS 登録済み: ${{ secrets.TO_ADDRESS != '' }}"

      - name: 株式レポート生成＆送信
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          TO_ADDRESS:        ${{ secrets.TO_ADDRESS }}
        run: python stock_report.py
